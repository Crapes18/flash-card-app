<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Card App</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Geist",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
:root{
  --primary:{{PRIMARY}};
  --accent:{{ACCENT}};
  --bg:#F8FAFF;
  --surface:#FFFFFF;
  --text:#1A1A2E;
  --text2:#6B7280;
  --text3:#9CA3AF;
  --border:#E5E7EB;
  --radius:16px;
}
.hidden{display:none!important}
.btn{border:none;cursor:pointer;font-family:inherit;transition:transform 0.12s,opacity 0.12s}
.btn:active{transform:scale(0.96)}
.back-btn{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;padding:8px 0;margin-bottom:20px}

/* Card flip */
.card-scene{perspective:1000px;width:100%;max-width:480px;margin:0 auto;cursor:pointer}
.card-3d{width:100%;min-height:220px;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1)}
.card-3d.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center}
.card-front{background:var(--primary);color:#fff}
.card-back{background:var(--surface);border:2px solid var(--primary);transform:rotateY(180deg)}
.card-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.6;margin-bottom:12px}
.card-text{font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.3}
.card-hint{font-size:13px;opacity:0.7;margin-top:10px;font-style:italic}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.3s ease-out}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home">
  <!-- Header -->
  <div style="background:var(--primary);padding:40px 24px 32px;text-align:center">
    <div id="home-emoji" style="font-size:56px;margin-bottom:12px"></div>
    <h1 id="home-title" style="color:#fff;font-size:30px;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px"></h1>
    <p id="home-subtitle" style="color:rgba(255,255,255,0.8);font-size:15px"></p>
  </div>

  <!-- Deck grid -->
  <div style="padding:24px;max-width:640px;margin:0 auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:17px;font-weight:700;color:var(--text)">Your Decks</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="deck-count" style="font-size:13px;color:var(--text3)"></span>
        <button class="btn" onclick="show('import')" style="display:flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600">
          ＋ Import
        </button>
      </div>
    </div>
    <div id="deck-grid" style="display:flex;flex-direction:column;gap:12px"></div>
  </div>
</div>

<!-- DECK VIEW -->
<div id="screen-deck" class="hidden" style="padding:24px;max-width:640px;margin:0 auto">
  <button class="back-btn" id="deck-back">← All Decks</button>
  <div id="deck-header" style="margin-bottom:24px"></div>
  <div id="card-list" style="display:flex;flex-direction:column;gap:10px"></div>
</div>

<!-- STUDY MODE -->
<div id="screen-study" class="hidden" style="padding:24px;max-width:520px;margin:0 auto">
  <button class="back-btn" id="study-back">← Back to Deck</button>

  <!-- Progress -->
  <div style="margin-bottom:24px">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span id="study-progress-text" style="font-size:13px;font-weight:600;color:var(--text2)"></span>
      <span id="study-score" style="font-size:13px;font-weight:600;color:var(--primary)"></span>
    </div>
    <div style="height:6px;background:var(--border);border-radius:99px;overflow:hidden">
      <div id="study-progress-bar" style="height:100%;background:var(--primary);border-radius:99px;transition:width 0.4s"></div>
    </div>
  </div>

  <!-- Flip card -->
  <div class="card-scene" id="card-scene" onclick="flipCard()">
    <div class="card-3d" id="card-3d">
      <div class="card-face card-front">
        <div class="card-label">Tap to reveal</div>
        <div class="card-text" id="card-front-text"></div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">Answer</div>
        <div class="card-text" id="card-back-text"></div>
        <div class="card-hint" id="card-hint-text"></div>
      </div>
    </div>
  </div>

  <p style="text-align:center;font-size:13px;color:var(--text3);margin:14px 0 20px">Tap the card to flip it</p>

  <!-- Answer buttons (shown after flip) -->
  <div id="answer-btns" class="hidden" style="display:flex;gap:10px">
    <button class="btn" onclick="markCard(false)" style="flex:1;padding:14px;border-radius:12px;background:#FEF2F2;border:2px solid #FECACA;color:#DC2626;font-size:14px;font-weight:600">Try Again</button>
    <button class="btn" onclick="markCard(true)"  style="flex:1;padding:14px;border-radius:12px;background:#F0FDF4;border:2px solid #BBF7D0;color:#16A34A;font-size:14px;font-weight:600">Got It ✓</button>
  </div>
</div>

<!-- COMPLETE -->
<div id="screen-complete" class="hidden" style="padding:40px 24px;max-width:480px;margin:0 auto;text-align:center">
  <div style="font-size:72px;margin-bottom:16px">🎉</div>
  <h2 id="complete-title" style="font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:10px;color:var(--text)"></h2>
  <p id="complete-score" style="font-size:18px;color:var(--primary);font-weight:700;margin-bottom:8px"></p>
  <p id="complete-sub" style="font-size:15px;color:var(--text2);margin-bottom:32px"></p>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button class="btn" id="btn-study-again" style="padding:14px;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:700">Study Again</button>
    <button class="btn" id="btn-back-decks"  style="padding:14px;border-radius:12px;background:var(--border);color:var(--text);font-size:15px;font-weight:600">Back to Decks</button>
  </div>
</div>

<!-- ADD CARDS SCREEN -->
<div id="screen-import" class="hidden" style="padding:24px;max-width:580px;margin:0 auto">
  <button class="back-btn" onclick="show('home')">← Back to Decks</button>
  <h2 style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:20px">Add Cards</h2>

  <!-- Mode tabs -->
  <div style="display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px">
    <button class="btn import-tab active-tab" id="tab-build" onclick="switchImportTab('build')" style="flex:1;padding:10px;border-radius:9px;font-size:13px;font-weight:600;background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08)">✏️ Build</button>
    <button class="btn import-tab" id="tab-pdf" onclick="switchImportTab('pdf')" style="flex:1;padding:10px;border-radius:9px;font-size:13px;font-weight:600;background:transparent;color:var(--text2)">📄 PDF</button>
    <button class="btn import-tab" id="tab-photo" onclick="switchImportTab('photo')" style="flex:1;padding:10px;border-radius:9px;font-size:13px;font-weight:600;background:transparent;color:var(--text2)">📷 Photo</button>
  </div>

  <!-- BUILD MODE -->
  <div id="import-build">
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px">
      <div>
        <label style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:6px">Question</label>
        <textarea id="build-question" rows="3" placeholder="Type your question here..."
          style="width:100%;background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;resize:vertical;font-family:inherit;line-height:1.5"
          onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'"></textarea>
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:6px">Answer</label>
        <textarea id="build-answer" rows="3" placeholder="Type the answer here..."
          style="width:100%;background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;resize:vertical;font-family:inherit;line-height:1.5"
          onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'"></textarea>
      </div>
      <button class="btn" onclick="addBuiltCard()" style="padding:13px;border-radius:12px;background:var(--primary);color:#fff;font-size:14px;font-weight:700">+ Add Card</button>
    </div>

    <div id="built-cards-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px"></div>

    <div id="build-save-section" class="hidden" style="border-top:1px solid var(--border);padding-top:16px">
      <input id="build-deck-name" placeholder="Deck name"
        style="width:100%;background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit;margin-bottom:10px"
        onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'" />
      <button class="btn" onclick="saveBuiltDeck()" style="width:100%;padding:14px;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:700">Save Deck</button>
    </div>
  </div>

  <!-- PDF MODE -->
  <div id="import-pdf" class="hidden">
    <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;width:100%;padding:40px 24px;background:var(--bg);border:2px dashed var(--border);border-radius:16px;cursor:pointer;text-align:center;transition:border-color 0.15s"
      onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
      <span style="font-size:48px">📄</span>
      <span style="font-size:16px;font-weight:700;color:var(--text)">Upload a PDF</span>
      <span style="font-size:13px;color:var(--text2)">We will extract the text and parse it into flashcards</span>
      <input type="file" accept=".pdf" style="display:none" onchange="handlePdfUpload(this)">
    </label>
    <p style="font-size:12px;color:var(--text3);text-align:center;margin-top:12px">Best results with text-based PDFs. Scanned documents may not extract well.</p>
    <div id="pdf-status" style="margin-top:16px"></div>
  </div>

  <!-- PHOTO MODE -->
  <div id="import-photo" class="hidden">
    <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;width:100%;padding:40px 24px;background:var(--bg);border:2px dashed var(--border);border-radius:16px;cursor:pointer;text-align:center;transition:border-color 0.15s"
      onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
      <span style="font-size:48px">📷</span>
      <span style="font-size:16px;font-weight:700;color:var(--text)">Upload a Photo</span>
      <span style="font-size:13px;color:var(--text2)">Use a photo as the answer side of a card</span>
      <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoUpload(this)">
    </label>

    <div id="photo-preview" class="hidden" style="margin-top:16px">
      <img id="photo-img" style="width:100%;border-radius:12px;margin-bottom:12px;max-height:200px;object-fit:cover">
      <label style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:6px">Question for this photo</label>
      <input id="photo-question" placeholder="What does this show?"
        style="width:100%;background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit;margin-bottom:10px"
        onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'" />
      <input id="photo-deck-name" placeholder="Deck name"
        style="width:100%;background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit;margin-bottom:10px"
        onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'" />
      <button class="btn" onclick="savePhotoCard()" style="width:100%;padding:14px;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:700">Add Photo Card</button>
    </div>
  </div>

  <!-- Shared success -->
  <div id="import-success" class="hidden" style="text-align:center;padding:32px 0">
    <div style="font-size:48px;margin-bottom:12px">✅</div>
    <p id="import-success-msg" style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px"></p>
    <button class="btn" onclick="show('home');resetImport()" style="padding:12px 28px;border-radius:12px;background:var(--primary);color:#fff;font-size:14px;font-weight:600">Back to Decks</button>
  </div>
</div>

<script>
var APP_DATA = {"app":{"title":"Flash Card App","subtitle":"Study smarter with spaced repetition and instant card generation","emoji":"🃏","primary":"#7C3AED","accent":"#EC4899"},"decks":[{"id":"deck1","title":"How to Use Flash Card App","description":"Learn the core features and study techniques built into the app","emoji":"🚀","cards":[{"front":"What is spaced repetition?","back":"A study technique that schedules card reviews at increasing intervals based on how well you recalled the answer, maximizing long-term retention with less total study time.","hint":"The harder a card feels, the sooner it comes back"},{"front":"What does the FSRS algorithm do?","back":"Free Spaced Repetition Scheduler (FSRS) predicts the exact moment you are about to forget a card and reschedules it just in time, making each review session as efficient as possible.","hint":"FSRS = smarter timing for every card"},{"front":"How do you import a document to generate cards?","back":"Tap the Import Document button on the main screen, choose a JPG, PNG, PDF, DOCX, or PPTX file (up to 10 MB), and the app will automatically parse the content and create Q and A card pairs for your deck.","hint":"Look for the upload icon on the home screen"},{"front":"What file types does the Import feature support?","back":"JPG, PNG (images with OCR), PDF, DOCX (Word), and PPTX (PowerPoint). Maximum file size is 10 MB per upload.","hint":"Basically everything in your Downloads folder"},{"front":"What is cross-device sync?","back":"Your decks and study progress are saved to the cloud and instantly available on both the iOS app and the web app whenever you sign in to your account.","hint":"Create on desktop, review on the bus"},{"front":"What is a shared deck library?","back":"A collection of decks published by other users that you can browse, copy, and study. Find pre-made decks for common subjects instead of building everything from scratch.","hint":"Why start from zero when someone already made it?"},{"front":"How does the card flip interaction work?","back":"Tap any card to reveal the answer on the back. After flipping, rate your recall as Again, Hard, Good, or Easy. Your rating tells the FSRS algorithm when to show that card next.","hint":"Be honest with your rating for best results"},{"front":"What happens during an import progress indicator?","back":"A progress bar appears while the app parses your file and sends the extracted text to the AI generation layer. You will see a confirmation when cards are ready to review.","hint":"Large PDFs may take a few extra seconds"}]},{"id":"deck2","title":"Biology — Cell Biology Essentials","description":"Core cell biology terms and concepts for high school and college bio exams","emoji":"🔬","cards":[{"front":"What is the function of the mitochondria?","back":"The mitochondria generates ATP (adenosine triphosphate) through cellular respiration, supplying the cell with usable energy. It is often called the powerhouse of the cell.","hint":"ATP = the cell's rechargeable battery"},{"front":"What is the difference between prokaryotic and eukaryotic cells?","back":"Prokaryotic cells lack a membrane-bound nucleus and organelles (e.g., bacteria). Eukaryotic cells have a true nucleus and membrane-bound organelles (e.g., animal and plant cells).","hint":"Pro = before nucleus, Eu = true nucleus"},{"front":"What is the role of the ribosome?","back":"Ribosomes synthesize proteins by translating messenger RNA (mRNA) sequences into chains of amino acids. They are found free in the cytoplasm or attached to the rough endoplasmic reticulum.","hint":"Think: ribosome = protein factory"},{"front":"Define osmosis","back":"Osmosis is the passive movement of water molecules across a semipermeable membrane from a region of lower solute concentration to a region of higher solute concentration.","hint":"Water moves toward where there is more stuff dissolved"},{"front":"What is the cell cycle?","back":"The cell cycle is the ordered series of events by which a cell grows and divides. It includes Interphase (G1, S, G2) and the Mitotic phase (mitosis and cytokinesis).","hint":"Interphase is the long prep phase before division"},{"front":"What is active transport?","back":"Active transport moves molecules across a membrane against their concentration gradient, requiring energy (ATP) and specific carrier proteins. Example: the sodium-potassium pump.","hint":"Against the gradient = needs energy"},{"front":"What does the Golgi apparatus do?","back":"The Golgi apparatus modifies, packages, and ships proteins and lipids received from the endoplasmic reticulum to their final destinations inside or outside the cell.","hint":"Think: Golgi = the cell post office"},{"front":"What is the difference between mitosis and meiosis?","back":"Mitosis produces two genetically identical diploid daughter cells for growth and repair. Meiosis produces four genetically unique haploid cells (gametes) for sexual reproduction.","hint":"Mitosis = maintenance, Meiosis = making gametes"}]},{"id":"deck3","title":"Spanish — High-Frequency Vocabulary","description":"The most useful everyday Spanish words and phrases for beginners and intermediates","emoji":"🇪🇸","cards":[{"front":"querer","back":"to want / to love (a person). Example: Quiero aprender español. (I want to learn Spanish.)","hint":"Also used to express love for people, not objects"},{"front":"aunque","back":"although / even though / even if. Example: Aunque estoy cansado, voy a estudiar. (Although I am tired, I will study.)","hint":"A very common connector in written and spoken Spanish"},{"front":"sin embargo","back":"however / nevertheless. Used to contrast two ideas, similar to the English word however. Example: Es difícil; sin embargo, es posible.","hint":"Literally means without embargo — used as a transition"},{"front":"What is the difference between ser and estar?","back":"Both mean to be. Ser is used for permanent or inherent qualities (identity, origin, profession). Estar is used for temporary states, locations, and conditions.","hint":"Ser = identity, Estar = state or place"},{"front":"¿Cuánto cuesta?","back":"How much does it cost? Essential shopping phrase. Response example: Cuesta diez euros. (It costs ten euros.)","hint":"Cuesta comes from the verb costar (to cost)"},{"front":"hace + time + que","back":"Used to express how long something has been happening. Example: Hace dos años que estudio español. (I have been studying Spanish for two years.)","hint":"Hace goes at the front, que connects to the verb"},{"front":"el subjuntivo — when do you use it?","back":"The subjunctive mood expresses doubt, desire, emotion, or hypothetical situations. Triggered by phrases like quiero que, espero que, es importante que, and ojalá.","hint":"If the main clause expresses wish or doubt, use subjunctive after que"},{"front":"preterite vs imperfect — key difference","back":"The preterite (indefinido) describes completed actions at a specific time. The imperfect (imperfecto) describes ongoing, habitual, or background actions in the past.","hint":"Preterite = a finished event, Imperfect = a backdrop or habit"},{"front":"ponerse + adjective","back":"Used to describe a sudden emotional or physical change of state. Example: Me puse nervioso. (I got nervous.) Comparable to to become or to get in English.","hint":"Ponerse is reflexive — always use the matching reflexive pronoun"}]},{"id":"deck4","title":"Law — Constitutional Law Fundamentals","description":"Key doctrines, cases, and concepts tested in 1L Constitutional Law courses","emoji":"⚖️","cards":[{"front":"What is judicial review?","back":"The power of federal courts to examine laws and executive actions and strike them down if they are found to violate the Constitution. Established by Marbury v. Madison (1803).","hint":"Marbury v. Madison is the foundation — know it cold"},{"front":"What is the Supremacy Clause?","back":"Article VI, Clause 2 of the Constitution. It establishes that the Constitution, federal laws, and treaties are the supreme law of the land, preempting conflicting state laws.","hint":"Federal law wins when federal and state law conflict"},{"front":"What is the rational basis test?","back":"The lowest level of judicial scrutiny. A law passes if it is rationally related to a legitimate government interest. The challenger bears the burden of proof. Used for most economic and social regulations.","hint":"Government almost always wins under rational basis"},{"front":"What triggers strict scrutiny?","back":"Strict scrutiny applies when a law discriminates based on a suspect classification (race, national origin) or burdens a fundamental right. The government must show a compelling interest and narrow tailoring.","hint":"Suspect class or fundamental right = government almost always loses"},{"front":"What is the Commerce Clause?","back":"Article I, Section 8, Clause 3 grants Congress the power to regulate commerce with foreign nations, among states, and with Native American tribes. It is the most common basis for federal legislation.","hint":"Gonzales v. Raich expanded this to purely local activity with aggregate effects"},{"front":"What is substantive due process?","back":"A doctrine holding that certain fundamental rights are protected from government interference even if proper procedures are followed. Protects rights not explicitly listed in the Constitution, such as privacy and marriage.","hint":"Lochner era (economic rights) vs. modern era (personal autonomy rights)"},{"front":"What is the Establishment Clause?","back":"The First Amendment provision that prohibits the government from making any law respecting an establishment of religion. Prevents official state religion and excessive government entanglement with religion.","hint":"Lemon test, endorsement test, and coercion test all used to evaluate violations"},{"front":"What is the holding in Brown v. Board of Education (1954)?","back":"The Supreme Court unanimously held that racial segregation in public schools violated the Equal Protection Clause of the Fourteenth Amendment. Overturned the separate but equal doctrine from Plessy v. Ferguson.","hint":"Separate is inherently unequal — that is the core holding"}]},{"id":"deck5","title":"Study Science — How Memory Works","description":"Evidence-based principles every student should know to study more effectively","emoji":"🧠","cards":[{"front":"What is the testing effect?","back":"The testing effect (retrieval practice effect) shows that actively recalling information from memory produces stronger long-term retention than re-reading or passively reviewing the same material.","hint":"Doing flashcards beats re-reading your notes every time"},{"front":"What is interleaving?","back":"Interleaving is a practice strategy where you mix different topics or problem types within a single study session instead of studying one topic in a block. It feels harder but produces better long-term learning.","hint":"Mix math, bio, and vocab in one session instead of blocking each"},{"front":"What is the spacing effect?","back":"Distributing study sessions over time (spaced practice) leads to significantly better retention than cramming the same total study time into one session. The forgetting and re-learning cycle strengthens memory.","hint":"One hour per day for five days beats five hours in one day"},{"front":"What is elaborative interrogation?","back":"A learning technique where you ask yourself why or how a fact is true and generate an explanation. Connecting new information to existing knowledge creates stronger, more retrievable memory traces.","hint":"Ask why after every new fact you encounter"},{"front":"What is the forgetting curve?","back":"Ebbinghaus discovered that memory of new information decays exponentially over time without review. After one day, about 70 percent of new material is forgotten if not revisited. Spaced repetition directly counters this.","hint":"Review at day 1, day 3, day 7, then monthly"},{"front":"What does desirable difficulty mean?","back":"Conditions that make learning feel harder in the moment (retrieval practice, interleaving, spacing) actually produce better long-term retention. Fluency during study does not equal durable learning.","hint":"Feeling confused while studying is often a good sign"},{"front":"What is the generation effect?","back":"You remember information better when you generate it yourself (write a definition in your own words, solve a problem) rather than simply reading or copying it. Active production strengthens encoding.","hint":"Close the book and write the answer before checking"}]}]};

// Apply theme
document.documentElement.style.setProperty("--primary", APP_DATA.app.primary || "#0F766E");
document.documentElement.style.setProperty("--accent",  APP_DATA.app.accent  || "#6366F1");

// State
var currentDeck = null;
var currentCards = [];
var currentIdx   = 0;
var correct      = 0;
var isFlipped    = false;

// ── Router ────────────────────────────────────────────────────────────────────
var SCREENS = ["home","deck","study","complete","import"];
function show(name) {
  SCREENS.forEach(function(s) {
    var el = document.getElementById("screen-" + s);
    if (el) el.classList.add("hidden");
  });
  updateBreadcrumb();
  var t = document.getElementById("screen-" + name);
  if (t) { t.classList.remove("hidden"); t.classList.add("fade-up"); }
  window.scrollTo(0, 0);
}

// ── Build home ────────────────────────────────────────────────────────────────
function buildHome() {
  var a = APP_DATA.app;
  document.getElementById("home-emoji").textContent   = a.emoji   || "🃏";
  document.getElementById("home-title").textContent   = a.title   || "Flash Cards";
  document.getElementById("home-subtitle").textContent = a.subtitle || "Flip, learn, repeat";
  document.getElementById("deck-count").textContent   = APP_DATA.decks.length + " deck" + (APP_DATA.decks.length !== 1 ? "s" : "");

  var grid = document.getElementById("deck-grid");
  APP_DATA.decks.forEach(function(deck) {
    var card = document.createElement("div");
    card.style.cssText = "background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:box-shadow 0.15s,transform 0.15s";
    card.innerHTML =
      '<div style="width:52px;height:52px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">' + deck.emoji + '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px">' + deck.title + '</div>' +
        '<div style="font-size:13px;color:var(--text2)">' + deck.description + '</div>' +
        '<div style="font-size:12px;color:var(--text3);margin-top:4px">' + deck.cards.length + ' cards</div>' +
      '</div>' +
      '<div style="font-size:20px;color:var(--text3)">›</div>';
    card.onmouseenter = function() { this.style.boxShadow = "0 4px 16px rgba(0,0,0,0.08)"; this.style.transform = "translateY(-1px)"; };
    card.onmouseleave = function() { this.style.boxShadow = "none"; this.style.transform = "none"; };
    card.setAttribute("data-deckid", deck.id);
    card.addEventListener("click", function() { openDeck(this.getAttribute("data-deckid")); });
    grid.appendChild(card);
  });
}

// ── Open deck ─────────────────────────────────────────────────────────────────
function openDeck(deckId) {
  currentDeck = APP_DATA.decks.find(function(d) { return d.id === deckId; });
  if (!currentDeck) return;

  document.getElementById("deck-header").innerHTML =
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">' +
    '<div style="width:56px;height:56px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:28px">' + currentDeck.emoji + '</div>' +
    '<div><div style="font-size:20px;font-weight:800;color:var(--text)">' + currentDeck.title + '</div>' +
    '<div style="font-size:13px;color:var(--text2)">' + currentDeck.description + '</div></div></div>' +
    '<button class="btn" onclick="startStudy()" style="width:100%;padding:14px;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:700">Study All ' + currentDeck.cards.length + ' Cards →</button>';

  var list = document.getElementById("card-list");
  list.innerHTML = "";
  currentDeck.cards.forEach(function(card, i) {
    var row = document.createElement("div");
    row.style.cssText = "background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:14px";
    row.innerHTML =
      '<div style="width:28px;height:28px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0;margin-top:1px">' + (i+1) + '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">' + card.front + '</div>' +
        '<div style="font-size:13px;color:var(--text2)">' + card.back + '</div>' +
      '</div>';
    list.appendChild(row);
  });

  document.getElementById("deck-back").onclick = function() { show("home"); };
  show("deck");
}

// ── Study mode ────────────────────────────────────────────────────────────────
function startStudy() {
  if (!currentDeck) return;
  currentCards = currentDeck.cards.slice().sort(function() { return Math.random() - 0.5; });
  currentIdx = 0;
  correct = 0;
  isFlipped = false;
  document.getElementById("study-back").onclick = function() { show("deck"); };
  showCard();
  show("study");
}

function showCard() {
  var card = currentCards[currentIdx];
  isFlipped = false;
  var el3d = document.getElementById("card-3d");
  el3d.classList.remove("flipped");
  document.getElementById("card-front-text").textContent = card.front;
  document.getElementById("card-back-text").textContent  = card.back;
  document.getElementById("card-hint-text").textContent  = card.hint || "";
  document.getElementById("answer-btns").classList.add("hidden");

  var pct = (currentIdx / currentCards.length) * 100;
  document.getElementById("study-progress-bar").style.width = pct + "%";
  document.getElementById("study-progress-text").textContent = "Card " + (currentIdx + 1) + " of " + currentCards.length;
  document.getElementById("study-score").textContent = correct + " correct";
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById("card-3d").classList.add("flipped");
  setTimeout(function() {
    document.getElementById("answer-btns").classList.remove("hidden");
  }, 300);
}

function markCard(gotIt) {
  if (gotIt) correct++;
  currentIdx++;
  if (currentIdx >= currentCards.length) {
    showComplete();
  } else {
    showCard();
  }
}

function showComplete() {
  var pct = Math.round((correct / currentCards.length) * 100);
  var emoji = pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";
  document.querySelector("#screen-complete div").textContent = emoji;
  document.getElementById("complete-title").textContent = pct >= 80 ? "Nice work!" : pct >= 60 ? "Good effort!" : "Keep practicing!";
  document.getElementById("complete-score").textContent = correct + " / " + currentCards.length + " correct (" + pct + "%)";
  document.getElementById("complete-sub").textContent = pct >= 80 ? "You are really getting the hang of this!" : "A little more practice and you will nail it!";
  document.getElementById("btn-study-again").onclick = startStudy;
  document.getElementById("btn-back-decks").onclick = function() { show("home"); };
  show("complete");
}

// ── Add Cards ────────────────────────────────────────────────────────────────
var builtCards = [];
var photoDataUrl = null;

function switchImportTab(tab) {
  ["build","pdf","photo"].forEach(function(t) {
    document.getElementById("import-" + t).classList.toggle("hidden", t !== tab);
    var btn = document.getElementById("tab-" + t);
    if (t === tab) {
      btn.style.background = "var(--surface)";
      btn.style.color = "var(--text)";
      btn.style.boxShadow = "0 1px 4px rgba(0,0,0,0.08)";
    } else {
      btn.style.background = "transparent";
      btn.style.color = "var(--text2)";
      btn.style.boxShadow = "none";
    }
  });
}

// ── Build tab ─────────────────────────────────────────────────────────────────
function addBuiltCard() {
  var q = document.getElementById("build-question").value.trim();
  var a = document.getElementById("build-answer").value.trim();
  if (!q || !a) { alert("Please enter both a question and an answer."); return; }
  builtCards.push({ front: q, back: a, hint: "" });
  document.getElementById("build-question").value = "";
  document.getElementById("build-answer").value = "";
  document.getElementById("build-question").focus();
  renderBuiltCards();
  document.getElementById("build-save-section").classList.remove("hidden");
}

function renderBuiltCards() {
  var list = document.getElementById("built-cards-list");
  list.innerHTML = "";
  builtCards.forEach(function(card, i) {
    var row = document.createElement("div");
    row.style.cssText = "background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px";
    row.innerHTML =
      '<div style="width:24px;height:24px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0">' + (i+1) + '</div>' +
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px">' + card.front + '</div>' +
      '<div style="font-size:12px;color:var(--text2)">' + card.back + '</div></div>' +
      '<button onclick="removeBuiltCard(' + i + ')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0;flex-shrink:0">×</button>';
    list.appendChild(row);
  });
}

function removeBuiltCard(i) {
  builtCards.splice(i, 1);
  renderBuiltCards();
  if (!builtCards.length) document.getElementById("build-save-section").classList.add("hidden");
}

function saveBuiltDeck() {
  if (!builtCards.length) return;
  var name = document.getElementById("build-deck-name").value.trim() || "My Cards";
  APP_DATA.decks.push({ id: "built-" + Date.now(), title: name, description: builtCards.length + " cards", emoji: "✏️", cards: builtCards.slice() });
  document.getElementById("deck-grid").innerHTML = ""; buildHome();
  document.getElementById("import-success-msg").textContent = '"' + name + '" saved with ' + builtCards.length + " cards";
  document.getElementById("import-build").classList.add("hidden");
  document.getElementById("import-success").classList.remove("hidden");
  builtCards = [];
}

// ── PDF tab ───────────────────────────────────────────────────────────────────
function handlePdfUpload(input) {
  var file = input.files[0];
  if (!file) return;
  var status = document.getElementById("pdf-status");
  status.innerHTML = '<p style="color:var(--text2);font-size:14px;text-align:center">Reading PDF...</p>';

  var reader = new FileReader();
  reader.onload = function(e) {
    var typedArray = new Uint8Array(e.target.result);
    if (typeof pdfjsLib === "undefined") {
      // Load PDF.js on demand
      var script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      script.onload = function() {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        extractPdfText(typedArray, status);
      };
      document.head.appendChild(script);
    } else {
      extractPdfText(typedArray, status);
    }
  };
  reader.readAsArrayBuffer(file);
}

function extractPdfText(typedArray, status) {
  pdfjsLib.getDocument(typedArray).promise.then(function(pdf) {
    status.innerHTML = '<p style="color:var(--text2);font-size:14px;text-align:center">Extracting text from ' + pdf.numPages + ' pages...</p>';
    var pages = [];
    for (var i = 1; i <= pdf.numPages; i++) pages.push(i);
    var allText = "";
    var done = 0;
    pages.forEach(function(pageNum) {
      pdf.getPage(pageNum).then(function(page) {
        page.getTextContent().then(function(tc) {
          allText += tc.items.map(function(s) { return s.str; }).join(" ") + "\n\n";
          done++;
          if (done === pages.length) processPdfText(allText, status);
        });
      });
    });
  }).catch(function() {
    status.innerHTML = '<p style="color:#DC2626;font-size:14px;text-align:center">Could not read this PDF. Try a text-based PDF.</p>';
  });
}

function processPdfText(text, status) {
  var cards = parsePdfText(text);
  if (!cards.length) {
    status.innerHTML = '<p style="color:#DC2626;font-size:14px;text-align:center">No Q&A pairs found. The PDF may not contain question/answer formatted content.</p>';
    return;
  }
  var deckName = "PDF Import";
  APP_DATA.decks.push({ id: "pdf-" + Date.now(), title: deckName, description: cards.length + " cards from PDF", emoji: "📄", cards: cards });
  document.getElementById("deck-grid").innerHTML = ""; buildHome();
  document.getElementById("import-success-msg").textContent = cards.length + " cards imported from PDF";
  document.getElementById("import-pdf").classList.add("hidden");
  document.getElementById("import-success").classList.remove("hidden");
}

function parsePdfText(text) {
  var cards = [];
  var qaRegex = /Q\s*:\s*([\s\S]*?)A\s*:\s*([\s\S]*?)(?=Q\s*:|$)/gi;
  var m;
  while ((m = qaRegex.exec(text)) !== null) {
    var f = m[1].trim().replace(/\s+/g, " ");
    var b = m[2].trim().replace(/\s+/g, " ");
    if (f && b && f.length < 300 && b.length < 300) cards.push({ front: f, back: b, hint: "" });
  }
  if (!cards.length) {
    text.split(/\n\s*\n/).forEach(function(block) {
      var lines = block.trim().split("\n").filter(function(l) { return l.trim(); });
      if (lines.length === 2) cards.push({ front: lines[0].trim(), back: lines[1].trim(), hint: "" });
    });
  }
  return cards;
}

// ── Photo tab ─────────────────────────────────────────────────────────────────
function handlePhotoUpload(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    photoDataUrl = e.target.result;
    document.getElementById("photo-img").src = photoDataUrl;
    document.getElementById("photo-preview").classList.remove("hidden");
  };
  reader.readAsDataURL(file);
}

function savePhotoCard() {
  if (!photoDataUrl) return;
  var q = document.getElementById("photo-question").value.trim() || "What is shown in this image?";
  var deckName = document.getElementById("photo-deck-name").value.trim() || "Photo Cards";
  var existing = APP_DATA.decks.find(function(d) { return d.title === deckName; });
  var card = { front: q, back: '<img src="' + photoDataUrl + '" style="max-width:100%;border-radius:8px">', hint: "", isImage: true };
  if (existing) {
    existing.cards.push(card);
  } else {
    APP_DATA.decks.push({ id: "photo-" + Date.now(), title: deckName, description: "Photo cards", emoji: "📷", cards: [card] });
  }
  document.getElementById("deck-grid").innerHTML = ""; buildHome();
  document.getElementById("import-success-msg").textContent = "Photo card added to \"" + deckName + "\"";
  document.getElementById("photo-preview").classList.add("hidden");
  document.getElementById("import-success").classList.remove("hidden");
  photoDataUrl = null;
}

function resetImport() {
  builtCards = []; photoDataUrl = null;
  document.getElementById("built-cards-list").innerHTML = "";
  document.getElementById("build-question").value = "";
  document.getElementById("build-answer").value = "";
  document.getElementById("build-save-section").classList.add("hidden");
  document.getElementById("import-success").classList.add("hidden");
  document.getElementById("import-build").classList.remove("hidden");
  document.getElementById("import-pdf").classList.add("hidden");
  document.getElementById("import-photo").classList.add("hidden");
  document.getElementById("photo-preview").classList.add("hidden");
  switchImportTab("build");
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildHome();
show("home");
</script>
