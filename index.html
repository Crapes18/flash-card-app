<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Card App</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Geist",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
:root{
  --primary:#7C3AED;
  --accent:#EC4899;
  --bg:#F8FAFF;
  --surface:#FFFFFF;
  --text:#1A1A2E;
  --text2:#6B7280;
  --text3:#9CA3AF;
  --border:#E5E7EB;
  --radius:16px;
}
.hidden{display:none!important}
.btn{border:none;cursor:pointer;font-family:inherit;transition:transform 0.12s,opacity 0.12s}
.btn:active{transform:scale(0.96)}
.back-btn{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;padding:8px 0;margin-bottom:20px}

/* Card flip */
.card-scene{perspective:1000px;width:100%;max-width:480px;margin:0 auto;cursor:pointer}
.card-3d{width:100%;min-height:220px;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1)}
.card-3d.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center}
.card-front{background:var(--primary);color:#fff}
.card-back{background:var(--surface);border:2px solid var(--primary);transform:rotateY(180deg)}
.card-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.6;margin-bottom:12px}
.card-text{font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.3}
.card-hint{font-size:13px;opacity:0.7;margin-top:10px;font-style:italic}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.3s ease-out}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home">
  <!-- Header -->
  <div style="background:var(--primary);padding:40px 24px 32px;text-align:center">
    <div id="home-emoji" style="font-size:56px;margin-bottom:12px"></div>
    <h1 id="home-title" style="color:#fff;font-size:30px;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px"></h1>
    <p id="home-subtitle" style="color:rgba(255,255,255,0.8);font-size:15px"></p>
  </div>

  <!-- Deck grid -->
  <div style="padding:24px;max-width:640px;margin:0 auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:17px;font-weight:700;color:var(--text)">Your Decks</h2>
      <span id="deck-count" style="font-size:13px;color:var(--text3)"></span>
    </div>
    <div id="deck-grid" style="display:flex;flex-direction:column;gap:12px"></div>
  </div>
</div>

<!-- DECK VIEW -->
<div id="screen-deck" class="hidden" style="padding:24px;max-width:640px;margin:0 auto">
  <button class="back-btn" id="deck-back">← All Decks</button>
  <div id="deck-header" style="margin-bottom:24px"></div>
  <div id="card-list" style="display:flex;flex-direction:column;gap:10px"></div>
</div>

<!-- STUDY MODE -->
<div id="screen-study" class="hidden" style="padding:24px;max-width:520px;margin:0 auto">
  <button class="back-btn" id="study-back">← Back to Deck</button>

  <!-- Progress -->
  <div style="margin-bottom:24px">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span id="study-progress-text" style="font-size:13px;font-weight:600;color:var(--text2)"></span>
      <span id="study-score" style="font-size:13px;font-weight:600;color:var(--primary)"></span>
    </div>
    <div style="height:6px;background:var(--border);border-radius:99px;overflow:hidden">
      <div id="study-progress-bar" style="height:100%;background:var(--primary);border-radius:99px;transition:width 0.4s"></div>
    </div>
  </div>

  <!-- Flip card -->
  <div class="card-scene" id="card-scene" onclick="flipCard()">
    <div class="card-3d" id="card-3d">
      <div class="card-face card-front">
        <div class="card-label">Tap to reveal</div>
        <div class="card-text" id="card-front-text"></div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">Answer</div>
        <div class="card-text" id="card-back-text"></div>
        <div class="card-hint" id="card-hint-text"></div>
      </div>
    </div>
  </div>

  <p style="text-align:center;font-size:13px;color:var(--text3);margin:14px 0 20px">Tap the card to flip it</p>

  <!-- Answer buttons (shown after flip) -->
  <div id="answer-btns" class="hidden" style="display:flex;gap:10px">
    <button class="btn" onclick="markCard(false)" style="flex:1;padding:14px;border-radius:12px;background:#FEF2F2;border:2px solid #FECACA;color:#DC2626;font-size:14px;font-weight:600">Try Again</button>
    <button class="btn" onclick="markCard(true)"  style="flex:1;padding:14px;border-radius:12px;background:#F0FDF4;border:2px solid #BBF7D0;color:#16A34A;font-size:14px;font-weight:600">Got It ✓</button>
  </div>
</div>

<!-- COMPLETE -->
<div id="screen-complete" class="hidden" style="padding:40px 24px;max-width:480px;margin:0 auto;text-align:center">
  <div style="font-size:72px;margin-bottom:16px">🎉</div>
  <h2 id="complete-title" style="font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:10px;color:var(--text)"></h2>
  <p id="complete-score" style="font-size:18px;color:var(--primary);font-weight:700;margin-bottom:8px"></p>
  <p id="complete-sub" style="font-size:15px;color:var(--text2);margin-bottom:32px"></p>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button class="btn" id="btn-study-again" style="padding:14px;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:700">Study Again</button>
    <button class="btn" id="btn-back-decks"  style="padding:14px;border-radius:12px;background:var(--border);color:var(--text);font-size:15px;font-weight:600">Back to Decks</button>
  </div>
</div>

<script>
var APP_DATA = {"app":{"title":"Flash Card App","subtitle":"Study smarter with spaced repetition and instant sync","emoji":"🃏","primary":"#7C3AED","accent":"#EC4899"},"decks":[{"id":"deck1","title":"FSRS Spaced Repetition","description":"Understand the algorithm powering your retention","emoji":"🧠","cards":[{"front":"What does FSRS stand for?","back":"Free Spaced Repetition Scheduler — a modern, open-source algorithm designed to optimize review intervals for long-term retention.","hint":"Think of it as a smarter Anki algorithm"},{"front":"What is the forgetting curve?","back":"A graph showing how memory decays exponentially over time without review. Discovered by Hermann Ebbinghaus in the 1880s.","hint":"Ebbinghaus — the OG memory researcher"},{"front":"What is a review interval?","back":"The number of days between reviewing a card. FSRS dynamically adjusts this based on your past performance on that specific card.","hint":"Longer interval = stronger memory"},{"front":"What does 'Again' mean in spaced repetition?","back":"You failed to recall the card. The interval resets to a short value (often 1 day) and the card is marked for relearning.","hint":"Do not worry — repetition fixes this"},{"front":"What is retrievability in FSRS?","back":"A value between 0 and 1 representing the estimated probability that you can successfully recall a card right now.","hint":"1.0 = perfect recall confidence"},{"front":"What is stability in FSRS?","back":"A measure of how long a memory is expected to last before retrievability drops to 90%. Higher stability means longer intervals.","hint":"Think of it as memory durability"},{"front":"Why is FSRS better than SM-2?","back":"FSRS uses a neural-network-trained model with more accurate memory parameters, leading to fewer over-reviews and better retention predictions.","hint":"SM-2 is Anki original algorithm"},{"front":"What rating should you give a hard but recalled card?","back":"Rate it 'Hard' — this signals to FSRS that the memory is fragile, so it schedules a shorter interval than 'Good' would.","hint":"Honest ratings improve the schedule"}]},{"id":"deck2","title":"App Feature Vocabulary","description":"Key terms every Flash Card App user should know","emoji":"📱","cards":[{"front":"What is a deck?","back":"A named collection of flashcards grouped by topic. Decks can be created, shared, imported, and studied independently.","hint":"Like a folder for your cards"},{"front":"What is cloud sync?","back":"Automatic saving and syncing of your decks across all your devices — web and iOS — so your progress is never lost.","hint":"Study on phone, review on laptop"},{"front":"What is the Q: / A: import format?","back":"A plain-text delimiter format where each card starts with Q: for the question and A: for the answer on the next line. Used for bulk card import.","hint":"Q: What is water? A: H2O"},{"front":"What is a freemium paywall?","back":"A model where core features are free but premium features (like cross-device sync or AI generation) require a paid subscription.","hint":"Free to start, pay to unlock"},{"front":"What does 'append to deck' mean during import?","back":"Parsed cards from an import are added to the end of an existing deck without deleting or replacing cards already in it.","hint":"Your old cards are safe"},{"front":"What is a shared deck library?","back":"A collection of publicly available decks created by other users that you can copy and study without building from scratch.","hint":"Like a marketplace for flashcards"},{"front":"What is the preview step in card import?","back":"A screen shown after parsing your input that displays all detected Q/A pairs before they are saved, letting you cancel or confirm.","hint":"Review before committing"},{"front":"What is localStorage in this app?","back":"A browser-based storage system used to save your deck data locally on your device without requiring a server or login.","hint":"Data lives in your browser"}]},{"id":"deck3","title":"Biology: Cell Structure","description":"Core cell biology terms for high school and intro college","emoji":"🔬","cards":[{"front":"What is the mitochondria?","back":"The organelle responsible for producing ATP through cellular respiration. Often called the powerhouse of the cell.","hint":"ATP = energy currency of the cell"},{"front":"What is the function of the nucleus?","back":"Stores the cell genetic material (DNA) and controls gene expression, acting as the control center of the cell.","hint":"Think of it as the cell headquarters"},{"front":"What is the endoplasmic reticulum?","back":"A network of membranes involved in protein and lipid synthesis. Rough ER has ribosomes; smooth ER does not.","hint":"Rough = ribosomes attached"},{"front":"What do ribosomes do?","back":"Translate mRNA into proteins. Found free in the cytoplasm or attached to the rough endoplasmic reticulum.","hint":"RNA in, protein out"},{"front":"What is the Golgi apparatus?","back":"Processes, packages, and ships proteins and lipids to their destinations inside or outside the cell.","hint":"The cell postal service"},{"front":"What is the cell membrane made of?","back":"A phospholipid bilayer embedded with proteins. It is selectively permeable, controlling what enters and exits the cell.","hint":"Hydrophilic heads face outward"},{"front":"What is the difference between prokaryotic and eukaryotic cells?","back":"Prokaryotic cells lack a membrane-bound nucleus (bacteria). Eukaryotic cells have a nucleus and membrane-bound organelles (plants, animals, fungi).","hint":"Pro = before nucleus, Eu = true nucleus"},{"front":"What is osmosis?","back":"The passive movement of water across a semipermeable membrane from an area of low solute concentration to high solute concentration.","hint":"Water follows the solute"}]},{"id":"deck4","title":"Spanish Vocabulary: Basics","description":"Essential Spanish words for beginner language learners","emoji":"🇪🇸","cards":[{"front":"How do you say 'hello' in Spanish?","back":"Hola — used as a casual and universal greeting at any time of day.","hint":"Sounds exactly like it looks"},{"front":"What does 'gracias' mean?","back":"Thank you. A polite and essential expression used constantly in everyday conversation.","hint":"Gra-see-as"},{"front":"How do you say 'I do not understand'?","back":"No entiendo — a critical phrase for any beginner navigating real conversations.","hint":"Entender = to understand"},{"front":"What is the difference between 'ser' and 'estar'?","back":"Both mean 'to be'. Ser is used for permanent traits (identity, origin). Estar is used for temporary states (mood, location).","hint":"Ser = permanent, Estar = temporary"},{"front":"How do you say 'Where is the bathroom?'","back":"Donde esta el bano? — one of the most practically useful phrases when traveling.","hint":"Bano = bathroom"},{"front":"What does 'por favor' mean?","back":"Please — used to make requests polite. Combine with gracias for maximum courtesy.","hint":"Por = for, favor = favor"},{"front":"How do you say the numbers 1 to 5 in Spanish?","back":"Uno, dos, tres, cuatro, cinco.","hint":"Dos sounds like 'dose'"},{"front":"What does 'me llamo' mean?","back":"My name is — literally translates to 'I call myself'. Used to introduce yourself.","hint":"Llamo comes from llamarse"}]},{"id":"deck5","title":"Study Skills and Memory Science","description":"Evidence-based techniques to study more effectively","emoji":"📖","cards":[{"front":"What is active recall?","back":"A study technique where you actively retrieve information from memory rather than passively rereading. Significantly more effective for long-term retention.","hint":"Testing yourself beats highlighting"},{"front":"What is the spacing effect?","back":"Learning is more durable when study sessions are spread out over time rather than crammed into one session (massed practice).","hint":"Distributed practice beats cramming"},{"front":"What is interleaving?","back":"Mixing different subjects or problem types within a single study session instead of blocking one topic at a time. Improves transfer and retention.","hint":"Switch topics, do not block them"},{"front":"What is the generation effect?","back":"Information is better remembered when you generate it yourself (writing, explaining) rather than simply reading it.","hint":"Write it out loud in your own words"},{"front":"What is the Feynman Technique?","back":"Explain a concept in simple language as if teaching it to a beginner. Gaps in your explanation reveal gaps in your understanding.","hint":"If you cannot explain it simply, you do not know it yet"},{"front":"What is sleep consolidation?","back":"During sleep, the brain replays and strengthens newly learned memories. Studying before sleep and getting full rest significantly boosts retention.","hint":"Sleep is not optional for studying"},{"front":"What is the testing effect?","back":"Taking practice tests on material improves long-term retention far more than restudying the same material — even when tests are failed.","hint":"Failed tests still build memory"},{"front":"What is cognitive load?","back":"The total mental effort being used in working memory. Overloading it with too many concepts at once reduces learning efficiency.","hint":"Study one concept deeply, not ten shallowly"}]}]};

// Apply theme
document.documentElement.style.setProperty("--primary", APP_DATA.app.primary || "#0F766E");
document.documentElement.style.setProperty("--accent",  APP_DATA.app.accent  || "#6366F1");

// State
var currentDeck = null;
var currentCards = [];
var currentIdx   = 0;
var correct      = 0;
var isFlipped    = false;

// ── Router ────────────────────────────────────────────────────────────────────
var SCREENS = ["home","deck","study","complete"];
function show(name) {
  SCREENS.forEach(function(s) {
    var el = document.getElementById("screen-" + s);
    if (el) el.classList.add("hidden");
  });
  var t = document.getElementById("screen-" + name);
  if (t) { t.classList.remove("hidden"); t.classList.add("fade-up"); }
  window.scrollTo(0, 0);
}

// ── Build home ────────────────────────────────────────────────────────────────
function buildHome() {
  var a = APP_DATA.app;
  document.getElementById("home-emoji").textContent   = a.emoji   || "🃏";
  document.getElementById("home-title").textContent   = a.title   || "Flash Cards";
  document.getElementById("home-subtitle").textContent = a.subtitle || "Flip, learn, repeat";
  document.getElementById("deck-count").textContent   = APP_DATA.decks.length + " deck" + (APP_DATA.decks.length !== 1 ? "s" : "");

  var grid = document.getElementById("deck-grid");
  APP_DATA.decks.forEach(function(deck) {
    var card = document.createElement("div");
    card.style.cssText = "background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:box-shadow 0.15s,transform 0.15s";
    card.innerHTML =
      '<div style="width:52px;height:52px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">' + deck.emoji + '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px">' + deck.title + '</div>' +
        '<div style="font-size:13px;color:var(--text2)">' + deck.description + '</div>' +
        '<div style="font-size:12px;color:var(--text3);margin-top:4px">' + deck.cards.length + ' cards</div>' +
      '</div>' +
      '<div style="font-size:20px;color:var(--text3)">›</div>';
    card.onmouseenter = function() { this.style.boxShadow = "0 4px 16px rgba(0,0,0,0.08)"; this.style.transform = "translateY(-1px)"; };
    card.onmouseleave = function() { this.style.boxShadow = "none"; this.style.transform = "none"; };
    card.setAttribute("data-deckid", deck.id);
    card.addEventListener("click", function() { openDeck(this.getAttribute("data-deckid")); });
    grid.appendChild(card);
  });
}

// ── Open deck ─────────────────────────────────────────────────────────────────
function openDeck(deckId) {
  currentDeck = APP_DATA.decks.find(function(d) { return d.id === deckId; });
  if (!currentDeck) return;

  document.getElementById("deck-header").innerHTML =
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">' +
    '<div style="width:56px;height:56px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:28px">' + currentDeck.emoji + '</div>' +
    '<div><div style="font-size:20px;font-weight:800;color:var(--text)">' + currentDeck.title + '</div>' +
    '<div style="font-size:13px;color:var(--text2)">' + currentDeck.description + '</div></div></div>' +
    '<button class="btn" onclick="startStudy()" style="width:100%;padding:14px;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:700">Study All ' + currentDeck.cards.length + ' Cards →</button>';

  var list = document.getElementById("card-list");
  list.innerHTML = "";
  currentDeck.cards.forEach(function(card, i) {
    var row = document.createElement("div");
    row.style.cssText = "background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:14px";
    row.innerHTML =
      '<div style="width:28px;height:28px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0;margin-top:1px">' + (i+1) + '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">' + card.front + '</div>' +
        '<div style="font-size:13px;color:var(--text2)">' + card.back + '</div>' +
      '</div>';
    list.appendChild(row);
  });

  document.getElementById("deck-back").onclick = function() { show("home"); };
  show("deck");
}

// ── Study mode ────────────────────────────────────────────────────────────────
function startStudy() {
  if (!currentDeck) return;
  currentCards = currentDeck.cards.slice().sort(function() { return Math.random() - 0.5; });
  currentIdx = 0;
  correct = 0;
  isFlipped = false;
  document.getElementById("study-back").onclick = function() { show("deck"); };
  showCard();
  show("study");
}

function showCard() {
  var card = currentCards[currentIdx];
  isFlipped = false;
  var el3d = document.getElementById("card-3d");
  el3d.classList.remove("flipped");
  document.getElementById("card-front-text").textContent = card.front;
  document.getElementById("card-back-text").textContent  = card.back;
  document.getElementById("card-hint-text").textContent  = card.hint || "";
  document.getElementById("answer-btns").classList.add("hidden");

  var pct = (currentIdx / currentCards.length) * 100;
  document.getElementById("study-progress-bar").style.width = pct + "%";
  document.getElementById("study-progress-text").textContent = "Card " + (currentIdx + 1) + " of " + currentCards.length;
  document.getElementById("study-score").textContent = correct + " correct";
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById("card-3d").classList.add("flipped");
  setTimeout(function() {
    document.getElementById("answer-btns").classList.remove("hidden");
  }, 300);
}

function markCard(gotIt) {
  if (gotIt) correct++;
  currentIdx++;
  if (currentIdx >= currentCards.length) {
    showComplete();
  } else {
    showCard();
  }
}

function showComplete() {
  var pct = Math.round((correct / currentCards.length) * 100);
  var emoji = pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "💪";
  document.querySelector("#screen-complete div").textContent = emoji;
  document.getElementById("complete-title").textContent = pct >= 80 ? "Nice work!" : pct >= 60 ? "Good effort!" : "Keep practicing!";
  document.getElementById("complete-score").textContent = correct + " / " + currentCards.length + " correct (" + pct + "%)";
  document.getElementById("complete-sub").textContent = pct >= 80 ? "You are really getting the hang of this!" : "A little more practice and you will nail it!";
  document.getElementById("btn-study-again").onclick = startStudy;
  document.getElementById("btn-back-decks").onclick = function() { show("home"); };
  show("complete");
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildHome();
show("home");
</script>
</body>
</html>
